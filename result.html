<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Transcript Result - YT Extract</title>
    <!-- Modern fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            text-decoration: none;
            font-weight: 500;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--accent-blue);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        .video-sidebar .thumbnail-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <!-- Abstract blurred gradients -->
    <div class="background-effect"></div>
    <div class="background-effect secondary"></div>
    
    <main class="container">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        
        <!-- Result Section -->
        <section id="result-section" class="result-section glass-panel" style="animation: fadeIn 0.5s ease forwards;">
            <div class="layout-grid">
                
                <!-- Video Details Sidebar -->
                <div class="video-sidebar">
                    <div class="thumbnail-wrapper" id="video-embed-container">
                        <!-- Iframe will be injected here -->
                    </div>
                    <div class="video-info">
                        <h3 id="video-title">Loading...</h3>
                        <p class="channel-name"><i class="fa-solid fa-circle-user"></i> <span id="channel-name">Channel Name</span></p>
                        <div class="stats" style="margin-top: 0.5rem; display: flex; gap: 1.5rem; font-size: 0.95rem; color: rgba(255,255,255,0.7);">
                            <span><i class="fa-solid fa-eye" style="color: var(--accent-blue);"></i> <span id="video-views">--</span> views</span>
                            <span><i class="fa-solid fa-thumbs-up" style="color: var(--accent-purple);"></i> <span id="video-likes">--</span> likes</span>
                        </div>
                    </div>
                </div>

                <!-- Transcript Area -->
                <div class="transcript-main">
                    <div class="transcript-header">
                        <h2>Transcript</h2>
                        <div class="actions">
                            <button id="copy-btn" class="action-btn" title="Copy to clipboard">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                            <button id="download-btn" class="action-btn" title="Download TXT">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="transcript-content" id="transcript-content">
                        <!-- Dynamic content will be injected here -->
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="result.js"></script>
</body>
</html>
