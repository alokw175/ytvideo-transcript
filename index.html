<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcript Extract</title>
    <!-- Modern fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Abstract blurred gradients -->
    <div class="background-effect"></div>
    <div class="background-effect secondary"></div>
    
    <main class="container">
        <div class="hero-split-layout">
            <div class="hero-text-content">
                <!-- Hero Section -->
                <header class="hero text-left">
                    <h1>YT Extract<span class="gradient-text">.io</span></h1>
                    <p>Automate your workflow. Generate high-quality transcripts from any YouTube video in seconds.</p>
                </header>

                <!-- Input Section -->
                <section class="input-section glass-panel">
                    <div class="input-container">
                        <i class="fa-brands fa-youtube youtube-icon"></i>
                        <input type="text" id="video-url" placeholder="Paste YouTube link here..." autocomplete="off">
                    </div>
                    <button id="extract-btn" class="glow-btn">
                        <span>Extract</span>
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </button>
                </section>

                <!-- Loading State -->
                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    <p>Extracting magic...</p>
                </div>
            </div>

            <div class="hero-image-content">
                <div class="hero-image-wrapper">
                    <!-- Glowing back-plate -->
                    <div class="image-glow"></div>
                    <!-- Main contextual image -->
                    <img src="https://images.unsplash.com/photo-1611162616475-46b635cb6868?q=80&w=800&auto=format&fit=crop" class="hero-illustration" alt="YouTube Concept">
                    
                    <!-- Floating abstract badges -->
                    <div class="floating-badge badge-1 glass-panel">
                        <i class="fa-solid fa-bolt" style="color: #fbbf24;"></i> Lightning Fast
                    </div>
                    <div class="floating-badge badge-2 glass-panel">
                        <i class="fa-solid fa-robot" style="color: #a78bfa;"></i> AI Powered
                    </div>
                </div>
            </div>
        </div>

        <!-- Result section moved to result.html -->
    </main>

    <script src="script.js"></script>
</body>
</html>
